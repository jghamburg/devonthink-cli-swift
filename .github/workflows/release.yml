name: Release

on:
  push:
    branches: [main]

# Required for creating GitHub Releases and pushing the CHANGELOG commit back to main.
permissions:
  contents: write

jobs:
  release:
    name: Semantic Release (macOS arm64)
    runs-on: macos-15        # arm64, Xcode 16, Swift 6 pre-installed

    # Only run if not the version-bump commit from a previous release cycle.
    # semantic-release appends [skip ci] to that commit — GitHub Actions honours it
    # automatically, so this job will not be triggered by those commits.

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # semantic-release needs full tag + commit history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Attribute the version-bump commit to the Actions bot, not the triggering user.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
